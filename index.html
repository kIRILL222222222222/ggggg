<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEON WEAVE | Киберсплав</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border-radius: 28px;
            box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.5), 0 20px 40px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            border-radius: 24px;
            cursor: none;
            transition: filter 0.1s;
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            font-weight: bold;
            text-shadow: 0 0 6px cyan;
        }

        .panel {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 10px 22px;
            border-radius: 40px;
            border-left: 3px solid #0ff;
            border-right: 3px solid #f0f;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #6efff0;
        }

        .weave-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
        }

        .weave-badge {
            color: #ffd966;
            font-size: 0.9rem;
        }

        .controls {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            padding: 8px 15px;
            border-radius: 24px;
            font-size: 11px;
            font-family: monospace;
            color: #aaa;
            pointer-events: none;
        }

        .power-info {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.65);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            color: #ffaa88;
            text-align: right;
            border-right: 2px solid gold;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 2px cyan; }
            100% { text-shadow: 0 0 12px magenta; }
        }
        .glow-text {
            animation: pulseGlow 1s infinite alternate;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1100" height="700"></canvas>
</div>
<div class="hud">
    <div class="panel">⚡ СКОРОСТЬ: <span id="speedVal">0</span> km/h</div>
    <div class="panel">🌀 ЦЕЛОСТНОСТЬ: <span id="integrityVal">100</span>%</div>
</div>
<div class="weave-panel" style="position: absolute; top: 15px; right: 15px;">
    <div class="weave-badge">🎆 ПЕРЕПЛЕТЕНИЕ: <span id="weaveType">ПЛАЗМА</span></div>
    <div class="weave-badge">✨ УЗОРЫ: <span id="patternCount">0</span></div>
</div>
<div class="controls">
    🖱️ МЫШЬ — движение | 🖱️ ЛКМ — переплести нити (сменить текстуру/стиль) | 🌀 ПРОБЕЛ — временный ускоритель
</div>
<div class="power-info">
    🔥 ИСКРА УСКОРЕНИЯ: <span id="boostMeter">100</span>%
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = 1100, height = 700;
        canvas.width = width;
        canvas.height = height;
        
        // ========== ИГРОВЫЕ ПАРАМЕТРЫ ==========
        let integrity = 100;            // целостность (здоровье)
        let patternScore = 0;           // собранные "узоры" (очки)
        let currentSpeed = 0;           // текущая скорость (влияет на сложность)
        let baseSpeed = 2.8;
        let boostCharge = 100;           // заряд ускорения (пробел)
        let isBoosting = false;
        let boostTimer = 0;
        
        // Переплетения (сменные текстуры и стиль игры)
        const weaves = ["ПЛАЗМА", "ГОЛОГРАММА", "НЕО-ТКАНЬ", "ЗЕРКАЛО", "КВАНТ"];
        let currentWeave = 0;
        
        // Игрок (управление мышью)
        let player = {
            x: width/2,
            y: height/2,
            radius: 18,
            trail: []       // эффект следа
        };
        
        // Объекты на поле: "Узоры" (собираемые) и "Разрывы" (препятствия)
        let patterns = [];      // узоры дают очки и меняют механику
        let rifts = [];         // разрывы — уменьшают целостность
        
        const MAX_PATTERNS = 18;
        const MAX_RIFTS = 12;
        
        let patternSpawnTimer = 0;
        let riftSpawnTimer = 0;
        
        // Спецэффекты
        let particles = [];
        let screenShake = 0;
        
        // Доп. система "Искажение нитей" – временные моды от переплетения
        let activeWeaveBuff = null;   // "magnet", "timewarp", "ghost"
        let buffTimer = 0;
        
        // ---- Вспомогательные функции ----
        function updateUI() {
            document.getElementById('speedVal').innerText = Math.floor(currentSpeed);
            document.getElementById('integrityVal').innerText = Math.max(0, Math.floor(integrity));
            document.getElementById('patternCount').innerText = patternScore;
            document.getElementById('weaveType').innerText = weaves[currentWeave];
            document.getElementById('boostMeter').innerText = Math.floor(boostCharge);
            if(activeWeaveBuff && buffTimer > 0){
                let buffName = activeWeaveBuff === "magnet" ? "🧲 МАГНИТ" : (activeWeaveBuff === "timewarp" ? "⏳ ЗАМЕДЛЕНИЕ" : "👻 ПРИЗРАК");
                document.getElementById('weaveType').innerHTML = `${weaves[currentWeave]} ✦ ${buffName}`;
            } else {
                if(activeWeaveBuff) activeWeaveBuff = null;
            }
        }
        
        // добавить частицы
        function addParticles(x, y, color, count, sizeBase=5) {
            for(let i=0;i<count;i++) {
                particles.push({
                    x: x + (Math.random()-0.5)*12,
                    y: y + (Math.random()-0.5)*12,
                    vx: (Math.random()-0.5)*3,
                    vy: (Math.random()-0.5)*3,
                    life: 0.7 + Math.random()*0.5,
                    size: sizeBase * (0.6+Math.random()*0.8),
                    color: color
                });
            }
        }
        
        // спавн узора (собираемый)
        function spawnPattern() {
            if(patterns.length >= MAX_PATTERNS) return;
            patterns.push({
                x: 40 + Math.random() * (width - 80),
                y: 40 + Math.random() * (height - 80),
                radius: 12,
                type: Math.floor(Math.random() * 3), // 0,1,2 форма
                angle: Math.random() * Math.PI * 2
            });
        }
        
        // спавн разрыва (препятствие)
        function spawnRift() {
            if(rifts.length >= MAX_RIFTS) return;
            rifts.push({
                x: 30 + Math.random() * (width - 60),
                y: 30 + Math.random() * (height - 60),
                radius: 14,
                pulse: Math.random() * Math.PI * 2
            });
        }
        
        // Урон
        function damageIntegrity(amount) {
            if(screenShake < 8) screenShake = 10;
            integrity -= amount;
            if(integrity <= 0) {
                integrity = 0;
                gameOver();
            }
            updateUI();
            addParticles(player.x, player.y, "#ff3366", 18, 7);
        }
        
        // Лечение / бонус
        function healIntegrity(amount) {
            integrity = Math.min(100, integrity + amount);
            updateUI();
            addParticles(player.x, player.y, "#33ffaa", 12, 5);
        }
        
        function gameOver() {
            alert("🌀 Нити реальности разорваны... Игра окончена. Нажмите ОК для перезапуска.");
            resetGame();
        }
        
        function resetGame() {
            integrity = 100;
            patternScore = 0;
            currentSpeed = 0;
            boostCharge = 100;
            isBoosting = false;
            boostTimer = 0;
            patterns = [];
            rifts = [];
            particles = [];
            activeWeaveBuff = null;
            buffTimer = 0;
            currentWeave = 0;
            player.x = width/2;
            player.y = height/2;
            patternSpawnTimer = 0;
            riftSpawnTimer = 0;
            for(let i=0;i<8;i++) spawnPattern();
            for(let i=0;i<3;i++) spawnRift();
            updateUI();
        }
        
        // смена переплетения (ЛКМ) мощная механика
        function shiftWeave() {
            currentWeave = (currentWeave + 1) % weaves.length;
            // при смене даём случайный бафф на 4 секунды
            const buffs = ["magnet", "timewarp", "ghost"];
            activeWeaveBuff = buffs[Math.floor(Math.random() * buffs.length)];
            buffTimer = 240; // 4сек при 60fps
            // также восстанавливаем немного целостности
            healIntegrity(8);
            // визуальный взрыв
            addParticles(player.x, player.y, `hsl(${Math.random()*360}, 80%, 60%)`, 40, 9);
            spawnTextEffect("⚡ ПЕРЕПЛЕТЕНИЕ!", player.x, player.y-30, "#ffff88");
            updateUI();
        }
        
        // Текстовый эффект
        function spawnTextEffect(text, x, y, color) {
            particles.push({
                type: "text",
                text: text,
                x: x, y: y,
                life: 1,
                vx: (Math.random()-0.5)*0.8,
                vy: -1.5,
                color: color,
                size: 18
            });
        }
        
        // активация ускорителя (пробел)
        function activateBoost() {
            if(boostCharge >= 20 && !isBoosting) {
                boostCharge -= 20;
                isBoosting = true;
                boostTimer = 45; // 0.75 сек ускорения
                addParticles(player.x, player.y, "#ffaa44", 25, 6);
                spawnTextEffect("🚀 УСКОРЕНИЕ!", player.x, player.y-20, "#ffaa44");
                updateUI();
            } else {
                spawnTextEffect("Не хватает искры!", player.x, player.y-20, "#ff8888");
            }
        }
        
        // Обновление логики
        function updateGame(mouseX, mouseY) {
            if(integrity <= 0) return;
            
            // 1. движение игрока за мышью (плавное)
            let targetX = Math.min(Math.max(mouseX, player.radius+8), width - player.radius-8);
            let targetY = Math.min(Math.max(mouseY, player.radius+8), height - player.radius-8);
            let lerpSpeed = 0.32;
            player.x = player.x + (targetX - player.x) * lerpSpeed;
            player.y = player.y + (targetY - player.y) * lerpSpeed;
            
            // траектория следа
            player.trail.unshift({x: player.x, y: player.y, life: 0.8});
            if(player.trail.length > 12) player.trail.pop();
            for(let t of player.trail) t.life -= 0.03;
            player.trail = player.trail.filter(t => t.life > 0);
            
            // 2. Скорость и сложность: скорость растёт со счётом
            let targetSpeed = 150 + patternScore * 2.2;
            targetSpeed = Math.min(480, targetSpeed);
            currentSpeed = currentSpeed * 0.98 + targetSpeed * 0.02;
            
            // ускорение
            let globalSpeedMul = 1.0;
            if(isBoosting && boostTimer > 0) {
                boostTimer--;
                globalSpeedMul = 2.4;
                if(boostTimer <= 0) isBoosting = false;
            } else {
                // реген заряда ускорения
                boostCharge = Math.min(100, boostCharge + 0.25);
                updateUI();
            }
            
            let effectiveSpeed = (baseSpeed + (currentSpeed / 100)) * globalSpeedMul;
            
            // 3. Спавн объектов
            if(patternSpawnTimer <= 0 && patterns.length < MAX_PATTERNS) {
                spawnPattern();
                patternSpawnTimer = 25 - Math.floor(currentSpeed/40);
                if(patternSpawnTimer < 10) patternSpawnTimer = 10;
            } else patternSpawnTimer--;
            
            if(riftSpawnTimer <= 0 && rifts.length < MAX_RIFTS) {
                spawnRift();
                riftSpawnTimer = 40 - Math.floor(currentSpeed/50);
                if(riftSpawnTimer < 12) riftSpawnTimer = 12;
            } else riftSpawnTimer--;
            
            // 4. Баффы времени (timewarp)
            let timeScale = 1.0;
            if(activeWeaveBuff === "timewarp" && buffTimer > 0) timeScale = 0.55;
            
            // таймер баффа
            if(buffTimer > 0) {
                buffTimer--;
                if(buffTimer <= 0) activeWeaveBuff = null;
            }
            
            // 5. Проверка столкновений с узорами и разрывами + бафф магнита
            // УЗОРЫ
            for(let i=0;i<patterns.length;i++) {
                let p = patterns[i];
                let dx = player.x - p.x;
                let dy = player.y - p.y;
                let dist = Math.hypot(dx, dy);
                let collectRadius = player.radius + p.radius;
                let magnetBonus = (activeWeaveBuff === "magnet" && buffTimer>0) ? 42 : 0;
                if(dist < collectRadius + magnetBonus) {
                    // собран узор
                    patternScore++;
                    addParticles(p.x, p.y, "#ffcc44", 14, 6);
                    patterns.splice(i,1);
                    i--;
                    healIntegrity(2);
                    updateUI();
                    continue;
                }
                // анимация вращения
                p.angle += 0.05 * timeScale;
            }
            
            // РАЗРЫВЫ
            for(let i=0;i<rifts.length;i++) {
                let r = rifts[i];
                let dx = player.x - r.x;
                let dy = player.y - r.y;
                let dist = Math.hypot(dx, dy);
                let ghostActive = (activeWeaveBuff === "ghost" && buffTimer>0);
                if(dist < player.radius + r.radius && !ghostActive) {
                    damageIntegrity(12);
                    addParticles(r.x, r.y, "#ff3366", 20, 8);
                    rifts.splice(i,1);
                    i--;
                } else if(ghostActive && dist < player.radius + r.radius) {
                    // если призрак - можно проходить, но отталкиваем визуал
                    addParticles(r.x, r.y, "#aaffdd", 5, 3);
                }
                r.pulse += 0.07;
            }
            
            // 6. Постоянное движение объектов + подстройка под скорость
            // Узоры: слегка дрифтят
            for(let p of patterns) {
                p.x += (Math.sin(Date.now()*0.002 + p.x)*0.2) * (effectiveSpeed/2);
                p.y += (Math.cos(Date.now()*0.0017 + p.y)*0.2) * (effectiveSpeed/2);
                p.x = Math.min(Math.max(p.x, 20), width-20);
                p.y = Math.min(Math.max(p.y, 20), height-20);
            }
            for(let r of rifts) {
                r.x += (Math.sin(Date.now()*0.0015 + r.y)*0.25) * (effectiveSpeed/1.8);
                r.y += (Math.cos(Date.now()*0.0019 + r.x)*0.25) * (effectiveSpeed/1.8);
                r.x = Math.min(Math.max(r.x, 15), width-15);
                r.y = Math.min(Math.max(r.y, 15), height-15);
            }
            
            // 7. Легкое тряска камеры
            if(screenShake > 0) screenShake -= 0.5;
            
            // 8. частицы
            for(let i=0;i<particles.length;i++) {
                let p = particles[i];
                p.life -= 0.02;
                if(p.type === "text") {
                    p.x += p.vx;
                    p.y += p.vy;
                } else {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.size *= 0.97;
                }
                if(p.life <= 0) particles.splice(i,1), i--;
            }
        }
        
        // ------------------ ОТРИСОВКА С ТЕКСТУРАМИ И ЭФФЕКТАМИ ------------------
        function drawBackgroundWeave() {
            // динамический фон под стиль переплетения
            const gradBack = ctx.createLinearGradient(0, 0, width, height);
            if(currentWeave === 0) { // плазма
                gradBack.addColorStop(0, "#0a0b1e");
                gradBack.addColorStop(1, "#1a1a3a");
                ctx.fillStyle = gradBack;
                ctx.fillRect(0,0,width,height);
                for(let i=0;i<120;i++) {
                    ctx.beginPath();
                    ctx.moveTo(i*20, 0);
                    ctx.lineTo(i*20+30, height);
                    ctx.strokeStyle = `rgba(80, 80, 255, ${0.1+Math.sin(Date.now()*0.003+i)*0.05})`;
                    ctx.stroke();
                }
            } else if(currentWeave === 1) { // голограмма
                ctx.fillStyle = "#0b1125";
                ctx.fillRect(0,0,width,height);
                for(let g=0;g<200;g++) {
                    ctx.fillStyle = `rgba(0, 255, 200, ${0.2*Math.sin(g+Date.now()*0.004)})`;
                    ctx.fillRect((g*17)%width, (g*33)%height, 3,3);
                }
            } else if(currentWeave === 2) { // нео-ткань
                ctx.fillStyle = "#130c1f";
                ctx.fillRect(0,0,width,height);
                ctx.beginPath();
                for(let i=0;i<30;i++) {
                    ctx.moveTo(0, i*30);
                    ctx.lineTo(width, i*30+Math.sin(Date.now()*0.005+i)*15);
                    ctx.strokeStyle = "#ff44aa";
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            } else if(currentWeave === 3) { // зеркало
                ctx.fillStyle = "#11161f";
                ctx.fillRect(0,0,width,height);
                let grad = ctx.createLinearGradient(0,0,width,height);
                grad.addColorStop(0, "#88aaff");
                grad.addColorStop(1, "#332288");
                ctx.fillStyle = grad;
                ctx.globalAlpha=0.3;
                for(let i=0;i<500;i++) {
                    ctx.fillRect(Math.random()*width, Math.random()*height, 4,4);
                }
                ctx.globalAlpha=1;
            } else { 
                ctx.fillStyle = "#030518";
                ctx.fillRect(0,0,width,height);
                for(let q=0;q<60;q++) {
                    ctx.beginPath();
                    ctx.arc(width/2+Math.sin(Date.now()*0.002+q)*140, height/2+Math.cos(q)*100, 40,0,Math.PI*2);
                    ctx.fillStyle = `rgba(255,60,210,0.08)`;
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
        }
        
        function drawPlayer() {
            ctx.shadowBlur = 16;
            ctx.shadowColor = "#0ff";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius-2, 0, Math.PI*2);
            ctx.fillStyle = "#55eeff";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius-6, 0, Math.PI*2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.fillStyle = "#00ddff";
            ctx.font = "bold 24px monospace";
            ctx.fillText("⚡", player.x-12, player.y+9);
            // следы
            for(let t of player.trail) {
                ctx.globalAlpha = t.life * 0.5;
                ctx.beginPath();
                ctx.arc(t.x, t.y, player.radius-6, 0, Math.PI*2);
                ctx.fillStyle = `#77ffff`;
                ctx.fill();
            }
            ctx.globalAlpha=1;
            ctx.shadowBlur=0;
        }
        
        function drawPatterns() {
            for(let p of patterns) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = "gold";
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.beginPath();
                for(let i=0;i<5;i++) {
                    let angle = (i/5)*Math.PI*2;
                    let x1 = Math.cos(angle)*p.radius;
                    let y1 = Math.sin(angle)*p.radius;
                    if(i===0) ctx.moveTo(x1, y1);
                    else ctx.lineTo(x1, y1);
                }
                ctx.closePath();
                const grad = ctx.createLinearGradient(-5,-5,5,5);
                grad.addColorStop(0, "#ffaa44");
                grad.addColorStop(1, "#ff66cc");
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 16px monospace";
                ctx.fillText("✦", -5, 5);
                ctx.restore();
            }
        }
        
        function drawRifts() {
            for(let r of rifts) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#ff00aa";
                ctx.beginPath();
                let pulseScale = 0.7 + Math.sin(r.pulse * 3) * 0.2;
                ctx.arc(r.x, r.y, r.radius * pulseScale, 0, Math.PI*2);
                ctx.fillStyle = "#c12266";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius-4, 0, Math.PI*2);
                ctx.fillStyle = "#ff3388";
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.font = "bold 14px monospace";
                ctx.fillText("💀", r.x-6, r.y+5);
            }
        }
        
        function drawParticlesAndEffects() {
            for(let p of particles) {
                ctx.globalAlpha = p.life;
                if(p.type === "text") {
                    ctx.font = `bold ${p.size}px "Orbitron"`;
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 6;
                    ctx.fillText(p.text, p.x, p.y);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur=0;
        }
        
        function drawUIextra() {
            ctx.font = "bold 28px 'Orbitron'";
            ctx.fillStyle = "rgba(255,255,200,0.3)";
            ctx.fillText("⚡", width-45, 55);
            if(isBoosting) {
                ctx.font = "bold 20px monospace";
                ctx.fillStyle = "#ffaa66";
                ctx.fillText("BOOST!", width-100, 90);
            }
        }
        
        // --- Mouse tracking ---
        let mouseX = width/2, mouseY = height/2;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            let mx = (e.clientX - rect.left) * (width/rect.width);
            let my = (e.clientY - rect.top) * (height/rect.height);
            mouseX = Math.min(Math.max(mx, 10), width-10);
            mouseY = Math.min(Math.max(my, 10), height-10);
        });
        
        canvas.addEventListener('click', (e) => {
            if(integrity <=0) return;
            shiftWeave();   // ЛКМ - переплетение
        });
        
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') {
                e.preventDefault();
                activateBoost();
            }
        });
        
        // анимация с тряской
        let shakeOffset = {x:0, y:0};
        function renderWithShake() {
            if(screenShake > 0) {
                shakeOffset.x = (Math.random() - 0.5) * screenShake;
                shakeOffset.y = (Math.random() - 0.5) * screenShake;
            } else {
                shakeOffset.x = 0; shakeOffset.y = 0;
            }
            ctx.save();
            ctx.translate(shakeOffset.x, shakeOffset.y);
            drawBackgroundWeave();
            drawPatterns();
            drawRifts();
            drawPlayer();
            drawParticlesAndEffects();
            drawUIextra();
            ctx.restore();
        }
        
        function gameLoop() {
            updateGame(mouseX, mouseY);
            renderWithShake();
            updateUI();
            requestAnimationFrame(gameLoop);
        }
        
        function init() {
            resetGame();
            for(let i=0;i<6;i++) spawnPattern();
            for(let i=0;i<2;i++) spawnRift();
            updateUI();
            gameLoop();
        }
        
        init();
    })();
</script>
</body>
</html>
