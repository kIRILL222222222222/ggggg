<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zombie Survival - Убежище, эвакуация и волны зомби</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1f1a 0%, #030d08 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            padding: 20px;
        }

        .game-wrapper {
            background: #1e2a1c;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 4px #5c3e24, 0 10px 28px black;
            cursor: crosshair;
            background-color: #253d1e;
        }

        .ui-bar {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #0c1809dd;
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid #dbb46a;
        }

        .stats {
            display: flex;
            gap: 24px;
            background: #030b01;
            padding: 5px 20px;
            border-radius: 40px;
            color: #ffe1a0;
        }

        .stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 1.1rem;
        }

        .stat span:first-child {
            font-size: 0.85rem;
            color: #b3f0a0;
        }

        .stat span:last-child {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffcd7e;
        }

        .upgrades {
            display: flex;
            gap: 12px;
        }

        button {
            background: #6d3e1c;
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 50px;
            color: #fff0cf;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 3px 0 #2f1a0a;
            font-size: 0.9rem;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2f1a0a;
        }

        .wave-badge {
            background: #0f2b0a;
            padding: 4px 18px;
            border-radius: 32px;
            font-size: 1.2rem;
            color: #ffbc5e;
        }
        @media (max-width: 760px) {
            .stats { gap: 10px; padding: 2px 12px; }
            .stat span:last-child { font-size: 1.1rem; }
            button { padding: 3px 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="1100" height="650"></canvas>
        <div class="ui-bar">
            <div class="stats">
                <div class="stat">❤️ <span id="playerHp">80</span></div>
                <div class="stat">🪙 <span id="coins">0</span></div>
                <div class="stat">⚔️ <span id="dmgLvl">1</span></div>
                <div class="stat">🏃 <span id="speedLvl">1</span></div>
                <div class="stat">🔫 <span id="fireLvl">1</span></div>
            </div>
            <div class="upgrades">
                <button id="upgradeDmg">🗡️ Урон (45💰)</button>
                <button id="upgradeSpeed">👟 Скорость (40💰)</button>
                <button id="upgradeFire">⚡ Перезарядка (50💰)</button>
            </div>
            <div class="wave-badge">
                🌊 Волна <span id="waveNum">1</span> | 🧟 <span id="zombiesLeft">0</span>
            </div>
        </div>
    </div>
    <div style="text-align: center; margin-top: 14px; color:#b9daa4; font-size: 12px;">
        🧭 WASD / стрелки — движение | 🔫 Клик по зомби = выстрел | 🩸 Зомби отнимают здоровье при касании | ⭐️ Элитные варианты сильнее
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 1100, CH = 650;
        canvas.width = CW; canvas.height = CH;
        
        // ----- ИГРОК -----
        let player = {
            x: CW/2, y: CH/2,
            hp: 80,
            maxHp: 80,
            radius: 18,
            speed: 3.6,
            baseSpeed: 3.6,
            invincibleTimer: 0
        };
        
        // ----- ВОЛНЫ И ЗОМБИ -----
        let zombies = [];
        let wave = 1;
        let waveActive = true;
        let enemiesToSpawn = 0;
        let enemiesLeft = 0;
        let spawnDelay = 0;
        let gameOver = false;
        
        // ----- МОНЕТЫ (выпадают при смерти зомби)-----
        let coins = 0;
        let coinDrops = []; // {x, y, value}
        
        // ----- УРОВНИ ПРОКАЧКИ-----
        let dmgLevel = 1;       // базовый урон 14 + 7 за уровень
        let speedLevel = 1;     // скорость игрока = 3.4 + 0.55*level
        let fireRateLevel = 1;   // задержка между выстрелами 380ms -> -45ms за уровень (мин 130)
        
        // СИСТЕМА СТРЕЛЬБЫ
        let lastShotTime = 0;
        
        // -------- БАЗОВЫЕ ФУНКЦИИ --------
        function getDamage(){
            return 14 + (dmgLevel-1) * 7;
        }
        function getPlayerSpeed(){
            return 3.4 + (speedLevel-1)*0.55;
        }
        function getShootDelay(){
            let delay = 380 - (fireRateLevel-1)*42;
            return Math.max(130, delay);
        }
        
        // апдейт UI
        function updateUI(){
            document.getElementById('playerHp').innerText = Math.max(0, player.hp);
            document.getElementById('coins').innerText = coins;
            document.getElementById('dmgLvl').innerText = dmgLevel;
            document.getElementById('speedLvl').innerText = speedLevel;
            document.getElementById('fireLvl').innerText = fireRateLevel;
            document.getElementById('waveNum').innerText = wave;
            document.getElementById('zombiesLeft').innerText = enemiesLeft;
        }
        
        // стоимости апгрейдов
        function dmgCost(){ return 40 + (dmgLevel-1)*12; }
        function speedCost(){ return 35 + (speedLevel-1)*10; }
        function fireCost(){ return 45 + (fireRateLevel-1)*14; }
        
        // ----- СПАВН ЗОМБИ (разные механики)-----
        function spawnZombie(){
            if(enemiesToSpawn <= 0) return;
            let side = Math.floor(Math.random() * 4);
            let x = 0, y = 0;
            if(side === 0){ x = 20 + Math.random() * 100; y = 20 + Math.random() * CH; }
            else if(side === 1){ x = CW - 70 + Math.random() * 60; y = 20 + Math.random() * CH; }
            else if(side === 2){ x = 20 + Math.random() * CW; y = 20 + Math.random() * 80; }
            else { x = 20 + Math.random() * CW; y = CH - 70 + Math.random() * 60; }
            
            // Уникальные типы зомби с механиками
            let typeRoll = Math.random();
            let isElite = (wave >= 4 && typeRoll < 0.2) || (wave >= 8 && typeRoll < 0.3);
            let variant = "normal";
            if(isElite){
                let r = Math.random();
                if(r < 0.4) variant = "tank";
                else if(r < 0.7) variant = "fast";
                else variant = "toxic";
            } else {
                if(wave > 5 && Math.random()<0.2) variant = "fast";
            }
            
            let health = 32 + Math.floor(wave * 4.2);
            let speed = 1.0 + wave * 0.09;
            let damage = 9 + Math.floor(wave/3);
            let color = "#3d6b2f";
            let radius = 18;
            
            if(variant === "tank"){
                health = Math.floor(health * 2.1);
                speed *= 0.62;
                damage += 5;
                color = "#6f4e2e";
                radius = 26;
            } else if(variant === "fast"){
                health = Math.floor(health * 0.7);
                speed *= 1.9;
                damage = Math.max(5, damage-3);
                color = "#93763b";
                radius = 16;
            } else if(variant === "toxic"){
                health = Math.floor(health * 1.2);
                speed *= 1.1;
                damage += 2;
                color = "#6c835c";
            }
            
            health = Math.min(240, health);
            speed = Math.min(4.6, speed);
            
            zombies.push({
                x: x, y: y, hp: health, maxHp: health,
                speed: speed, damage: damage, radius: radius,
                variant: variant, color: color
            });
            enemiesToSpawn--;
            enemiesLeft++;
        }
        
        // старт волны
        function startWave(){
            if(gameOver) return;
            waveActive = true;
            let baseCount = 5 + Math.floor(wave * 1.1);
            if(wave > 10) baseCount = 8 + Math.floor(wave * 0.8);
            enemiesToSpawn = Math.min(42, baseCount);
            enemiesLeft = 0;
            spawnDelay = 14;
        }
        
        // Обновление волн (и конца волны)
        function updateWaveManagement(){
            if(gameOver) return;
            if(waveActive && spawnDelay <= 0 && enemiesToSpawn > 0){
                spawnZombie();
                spawnDelay = Math.max(18, 40 - Math.floor(wave/2));
            } else if(spawnDelay > 0){
                spawnDelay--;
            }
            if(waveActive && enemiesToSpawn === 0 && zombies.length === 0){
                waveActive = false;
                wave++;
                // бонус монет за волну
                coins += 30 + wave*2;
                updateUI();
                startWave();
            }
        }
        
        // движение зомби к игроку
        function updateZombies(){
            for(let i=0; i<zombies.length; i++){
                const z = zombies[i];
                const dx = player.x - z.x;
                const dy = player.y - z.y;
                const dist = Math.hypot(dx,dy);
                if(dist > 0.01){
                    let move = Math.min(z.speed, dist - (z.radius+player.radius-2));
                    if(move>0){
                        z.x += (dx/dist)*move;
                        z.y += (dy/dist)*move;
                    }
                }
                // столкновение с игроком
                if(Math.hypot(player.x - z.x, player.y - z.y) < player.radius + z.radius){
                    if(player.invincibleTimer <= 0 && !gameOver){
                        player.hp -= z.damage;
                        player.invincibleTimer = 22;
                        if(player.hp <= 0){
                            player.hp = 0;
                            gameOver = true;
                            waveActive = false;
                        }
                        updateUI();
                    }
                    // отталкивание зомби при контакте
                    let angle = Math.atan2(player.y - z.y, player.x - z.x);
                    let push = 8;
                    z.x -= Math.cos(angle)*push;
                    z.y -= Math.sin(angle)*push;
                }
            }
            // удаление мёртвых зомби и дроп монет
            for(let i=0;i<zombies.length;i++){
                if(zombies[i].hp <= 0){
                    let dropVal = 6 + Math.floor(Math.random() * 9);
                    if(zombies[i].variant === "tank") dropVal += 9;
                    if(zombies[i].variant === "toxic") dropVal += 4;
                    coinDrops.push({x: zombies[i].x, y: zombies[i].y, value: dropVal, life: 1.0});
                    zombies.splice(i,1);
                    enemiesLeft--;
                    i--;
                }
            }
        }
        
        // Сбор монет
        function updateCoins(){
            for(let i=0; i<coinDrops.length; i++){
                let c = coinDrops[i];
                c.life -= 0.018;
                if(c.life <= 0){
                    coins += c.value;
                    coinDrops.splice(i,1);
                    updateUI();
                    i--;
                }
            }
        }
        
        // ----- СТРЕЛЬБА (клик мыши) -----
        function shootAt(mx, my){
            if(gameOver) return false;
            let curDamage = getDamage();
            for(let i=0; i<zombies.length; i++){
                let z = zombies[i];
                let dxZ = mx - z.x;
                let dyZ = my - z.y;
                if(Math.hypot(dxZ, dyZ) < z.radius+8){
                    z.hp -= curDamage;
                    if(z.hp <= 0){
                        // при смерти сразу дроп
                        let val = 5 + Math.floor(Math.random()*8);
                        if(z.variant === "tank") val+=10;
                        coinDrops.push({x: z.x, y: z.y, value: val, life: 1.0});
                        zombies.splice(i,1);
                        enemiesLeft--;
                    }
                    addHitEffect(mx, my);
                    return true;
                }
            }
            return false;
        }
        
        let hitEffects = [];
        function addHitEffect(x,y){
            hitEffects.push({x:x, y:y, life:7});
        }
        
        // движение игрока (WASD, стрелки)
        const keys = { ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false, w:false, s:false, a:false, d:false };
        function handleInput(){
            let moveX = 0, moveY = 0;
            if(keys.ArrowUp || keys.w) moveY -=1;
            if(keys.ArrowDown || keys.s) moveY +=1;
            if(keys.ArrowLeft || keys.a) moveX -=1;
            if(keys.ArrowRight || keys.d) moveX +=1;
            if(moveX !==0 || moveY !==0){
                let len = Math.hypot(moveX,moveY);
                moveX/=len; moveY/=len;
            }
            let spd = getPlayerSpeed();
            let newX = player.x + moveX*spd;
            let newY = player.y + moveY*spd;
            player.x = Math.min(Math.max(newX, 25 + player.radius), CW - player.radius - 12);
            player.y = Math.min(Math.max(newY, 35 + player.radius), CH - player.radius - 15);
            if(player.invincibleTimer > 0) player.invincibleTimer--;
        }
        
        // ----- ОТРИСОВКА -----
        function draw(){
            ctx.clearRect(0,0,CW,CH);
            ctx.fillStyle = "#2e552a";
            ctx.fillRect(0,0,CW,CH);
            for(let i=0;i<180;i++){
                ctx.fillStyle = "#477a3a";
                ctx.beginPath();
                ctx.arc( (i*173)%CW, (i*97)%CH, 3,0,Math.PI*2);
                ctx.fill();
            }
            // рисование монет
            for(let c of coinDrops){
                ctx.fillStyle = "#fdcc4a";
                ctx.shadowBlur = 5;
                ctx.font = "24px monospace";
                ctx.fillText("💰", c.x-8, c.y-8);
                ctx.fillStyle = "#f5b02e";
                ctx.font = "bold 15px monospace";
                ctx.fillText(`+${c.value}`, c.x+6, c.y-12);
            }
            ctx.shadowBlur=0;
            
            // зомби
            for(let z of zombies){
                ctx.fillStyle = z.color;
                ctx.beginPath();
                ctx.arc(z.x, z.y, z.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#251d12";
                ctx.font = `${Math.floor(z.radius)}px monospace`;
                ctx.fillText(z.variant === "tank"? "🧟‍♂️💪" : (z.variant==="fast"?"🧟⚡":"🧟"), z.x-15, z.y-9);
                ctx.fillStyle = "#922020";
                ctx.fillRect(z.x-z.radius, z.y-z.radius-8, z.radius*2, 7);
                ctx.fillStyle = "#cbe65c";
                let hpPercent = z.hp/z.maxHp;
                ctx.fillRect(z.x-z.radius, z.y-z.radius-8, z.radius*2*hpPercent, 7);
                ctx.fillStyle = "#fef7c0";
                ctx.font = "12px monospace";
                ctx.fillText(`${Math.floor(z.hp)}❤️`, z.x-10, z.y-13);
            }
            
            // игрок
            ctx.fillStyle = "#6c9e4d";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#cab87a";
            ctx.beginPath();
            ctx.arc(player.x-4, player.y-3, 4, 0, Math.PI*2);
            ctx.arc(player.x+4, player.y-3, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#212121";
            ctx.fillRect(player.x-5, player.y+5, 10, 6);
            ctx.fillStyle = "#c9ffb0";
            ctx.font = "20px monospace";
            ctx.fillText("😎", player.x-12, player.y-12);
            if(player.invincibleTimer>0){
                ctx.globalAlpha=0.5;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius+4, 0, Math.PI*2);
                ctx.fillStyle = "#fffbb0";
                ctx.fill();
                ctx.globalAlpha=1;
            }
            
            // эффекты выстрелов
            for(let i=0;i<hitEffects.length;i++){
                let h = hitEffects[i];
                ctx.fillStyle = `rgba(255,180,70,${h.life/7})`;
                ctx.beginPath();
                ctx.arc(h.x, h.y, 12,0,Math.PI*2);
                ctx.fill();
                h.life--;
                if(h.life<=0) hitEffects.splice(i,1);
            }
            
            if(gameOver){
                ctx.globalAlpha=0.85;
                ctx.fillStyle = "#11160e";
                ctx.fillRect(0,0,CW,CH);
                ctx.globalAlpha=1;
                ctx.font="bold 38px monospace";
                ctx.fillStyle="#e0813b";
                ctx.fillText("💀 ВЫ ПОГИБЛИ 💀", CW/2-190, CH/2-50);
                ctx.font="20px monospace";
                ctx.fillStyle="#ddbb77";
                ctx.fillText("Обновите страницу, чтобы выжить снова!", CW/2-200, CH/2+40);
                return;
            }
            ctx.font = "bold 16px monospace";
            ctx.fillStyle = "#fff4cf";
            ctx.fillText(`📊 Волна ${wave} | Осталось: ${enemiesLeft}`, 25, 45);
            ctx.fillStyle = "#ffffffaa";
            ctx.fillText(`🔫 урон:${getDamage()} | 🏃 скорость:${getPlayerSpeed().toFixed(1)}`, 25, 85);
        }
        
        // ---------- ОБРАБОТЧИК КЛИКА (выстрел с задержкой)----------
        function onCanvasClick(e){
            if(gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            let now = Date.now();
            let delay = getShootDelay();
            if(now - lastShotTime >= delay){
                lastShotTime = now;
                shootAt(mouseX, mouseY);
            }
        }
        
        // ----- ПРОКАЧКИ -----
        function upgradeDamage(){
            if(gameOver) return;
            let cost = dmgCost();
            if(coins>=cost){
                coins-=cost; dmgLevel++;
                updateUI();
            }
        }
        function upgradeSpeed(){
            if(gameOver) return;
            let cost = speedCost();
            if(coins>=cost){
                coins-=cost; speedLevel++;
                updateUI();
            }
        }
        function upgradeFire(){
            if(gameOver) return;
            let cost = fireCost();
            if(coins>=cost){
                coins-=cost; fireRateLevel++;
                updateUI();
            }
        }
        
        // ----- СОБЫТИЯ КЛАВИАТУРЫ -----
        window.addEventListener('keydown', (e)=>{
            let key = e.key;
            if(keys.hasOwnProperty(key)) keys[key]=true;
            if(key === 'ArrowUp'||key==='ArrowDown'||key==='ArrowLeft'||key==='ArrowRight'||key==='w'||key==='s'||key==='a'||key==='d')
                e.preventDefault();
        });
        window.addEventListener('keyup', (e)=>{
            let key = e.key;
            if(keys.hasOwnProperty(key)) keys[key]=false;
        });
        
        // ---- ЦИКЛ ----
        function gameLoop(){
            if(!gameOver){
                handleInput();
                updateZombies();
                updateCoins();
                updateWaveManagement();
                draw();
            } else draw();
            requestAnimationFrame(gameLoop);
        }
        
        function init(){
            startWave();
            updateUI();
            canvas.addEventListener('click', onCanvasClick);
            document.getElementById('upgradeDmg').addEventListener('click', upgradeDamage);
            document.getElementById('upgradeSpeed').addEventListener('click', upgradeSpeed);
            document.getElementById('upgradeFire').addEventListener('click', upgradeFire);
            gameLoop();
        }
        init();
    })();
</script>
</body>
</html>
