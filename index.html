<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zombie Apocalypse: Эпическая выживалка с боссами и способностями</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a2a15, #030703);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Monaco', monospace;
            font-weight: bold;
            padding: 20px;
        }

        .game-container {
            background: #1f2c1ad9;
            border-radius: 56px;
            padding: 18px;
            backdrop-filter: blur(3px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.7);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 0 0 5px #7a582e, 0 15px 35px black;
            cursor: crosshair;
        }

        .ui-panel {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #0b1207dd;
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid #e6bc7e;
        }

        .stats {
            display: flex;
            gap: 20px;
            background: #020a01;
            padding: 6px 20px;
            border-radius: 48px;
            color: #ffeaac;
        }

        .stat {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .stat span:first-child {
            font-size: 0.8rem;
            color: #bdf2a0;
        }

        .stat span:last-child {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffcf6e;
        }

        .skills {
            display: flex;
            gap: 12px;
        }

        button {
            background: #7e4a23;
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 40px;
            color: #fff2db;
            cursor: pointer;
            transition: 0.07s;
            box-shadow: 0 3px 0 #35200c;
            font-size: 0.8rem;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #35200c;
        }

        .special {
            background: #935e2e;
            box-shadow: 0 0 6px #ffb347;
        }

        .wave-info {
            background: #10200b;
            padding: 5px 22px;
            border-radius: 36px;
            font-size: 1.1rem;
        }
        @media (max-width: 800px) {
            .stats { gap: 8px; padding: 3px 12px; }
            .stat span:last-child { font-size: 1rem; }
            button { padding: 3px 8px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
        <div class="ui-panel">
            <div class="stats">
                <div class="stat">❤️ <span id="hpVal">100</span></div>
                <div class="stat">🪙 <span id="coinVal">0</span></div>
                <div class="stat">⚔️ <span id="dmgShow">1</span></div>
                <div class="stat">💨 <span id="spdShow">1</span></div>
                <div class="stat">🔫 <span id="fireShow">1</span></div>
                <div class="stat">✨ <span id="critShow">0</span>%</div>
            </div>
            <div class="skills">
                <button id="upgDmg">🗡️ Урон (50💰)</button>
                <button id="upgSpd">👟 Скорость (45💰)</button>
                <button id="upgFire">⚡ Скорострельность (55💰)</button>
                <button id="upgCrit" class="special">⭐ Крит.шанс (80💰)</button>
                <button id="abilityBtn" class="special">🌀 Атомный взрыв (готов)</button>
            </div>
            <div class="wave-info">
                🌊 <span id="waveNb">1</span> | 🧟 <span id="zCount">0</span> | 🧪 <span id="bossAlert"></span>
            </div>
        </div>
    </div>
    <div style="text-align: center; margin-top: 13px; color:#dbca9a; font-size: 11px;">
        🕹️ WASD/стрелки | 🔫 КЛИК по зомби | 🌀 Атомная способность (Q) — раз в 50 сек | 🧟‍♂️ Босс каждые 5 волн! 💎
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 1200, CH = 700;
        canvas.width = CW; canvas.height = CH;
        
        // ----- ИГРОК с текстурными деталями -----
        let player = {
            x: CW/2, y: CH/2, hp: 100, maxHp: 100,
            radius: 20, baseSpeed: 3.9, invincible: 0,
            critChance: 0    // в процентах
        };
        
        // ----- волны и враги -----
        let zombies = [];
        let wave = 1;
        let waveActive = true;
        let enemiesToSpawn = 0;
        let enemiesLeft = 0;
        let spawnTimer = 0;
        let gameOver = false;
        let bossWave = false;
        let bossEntity = null;  // особый босс
        
        // монеты, эффекты
        let coins = 100;
        let coinDrops = [];
        let particles = [];
        
        // система прокачки
        let dmgLvl = 1, speedLvl = 1, fireLvl = 1, critLvl = 0;
        
        // способность "Атомный взрыв"
        let abilityReady = true;
        let abilityCooldown = 0;   // кадры
        let lastFrameTime = 0;
        
        // выстрелы
        let lastShotTime = 0;
        
        // ------ функции расчета ------
        function getDamage() {
            let base = 16 + (dmgLvl-1) * 9;
            return base;
        }
        function getPlayerSpeed() { return 3.8 + (speedLvl-1)*0.6; }
        function getShootDelay() { return Math.max(120, 390 - (fireLvl-1)*45); }
        function getCritChance() { return Math.min(55, critLvl * 7); }
        
        function uiUpdate() {
            document.getElementById('hpVal').innerHTML = Math.max(0,player.hp);
            document.getElementById('coinVal').innerHTML = coins;
            document.getElementById('dmgShow').innerHTML = dmgLvl;
            document.getElementById('spdShow').innerHTML = speedLvl;
            document.getElementById('fireShow').innerHTML = fireLvl;
            document.getElementById('critShow').innerHTML = getCritChance();
            document.getElementById('waveNb').innerHTML = wave;
            document.getElementById('zCount').innerHTML = enemiesLeft + (bossEntity ? 1 : 0);
            if(bossEntity) document.getElementById('bossAlert').innerHTML = "👑 БОСС";
            else document.getElementById('bossAlert').innerHTML = "";
        }
        
        // стоимость апгрейдов
        function costDmg() { return 45 + (dmgLvl-1)*15; }
        function costSpd() { return 40 + (speedLvl-1)*12; }
        function costFire() { return 50 + (fireLvl-1)*16; }
        function costCrit() { return 70 + critLvl*18; }
        
        // способность: урон всем зомби и боссу
        function nuclearBlast() {
            if(!abilityReady || gameOver) return false;
            let dmg = 85 + wave * 12;
            for(let i=0;i<zombies.length;i++){
                zombies[i].hp -= dmg;
                if(zombies[i].hp <= 0){
                    let val = 12 + Math.floor(Math.random()*15);
                    coinDrops.push({x: zombies[i].x, y: zombies[i].y, value: val, life:1.0});
                    zombies.splice(i,1);
                    enemiesLeft--;
                    i--;
                }
            }
            if(bossEntity){
                bossEntity.hp -= dmg;
                if(bossEntity.hp <= 0){
                    coinDrops.push({x: bossEntity.x, y: bossEntity.y, value: 80 + wave*5, life:1.0});
                    bossEntity = null;
                }
            }
            // визуальные частицы
            for(let i=0;i<40;i++) particles.push({x: player.x, y: player.y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 18});
            abilityReady = false;
            abilityCooldown = 1800; // ~ 30 секунд при 60fps (1800 кадров)
            document.getElementById('abilityBtn').innerHTML = "🌀 Перезарядка...";
            setTimeout(()=>{ if(!abilityReady) document.getElementById('abilityBtn').innerHTML = "🌀 Атомный взрыв (готов)"; }, 30000);
            return true;
        }
        
        // спавн обычных зомби (разные текстуры и механики)
        function spawnZombie() {
            if(enemiesToSpawn <=0) return;
            let side = Math.floor(Math.random()*4);
            let x = 0, y = 0;
            if(side===0){ x = 30 + Math.random()*150; y = 20 + Math.random()*CH; }
            else if(side===1){ x = CW-100 + Math.random()*90; y = 20 + Math.random()*CH; }
            else if(side===2){ x = 20+Math.random()*CW; y = 30+Math.random()*100; }
            else { x = 20+Math.random()*CW; y = CH-80+Math.random()*70; }
            
            let typeRand = Math.random();
            let variant = "normal";
            let special = "";
            if(wave >= 3 && typeRand<0.2) variant = "fast";
            if(wave >= 5 && typeRand<0.18) variant = "tank";
            if(wave >= 7 && typeRand<0.15) variant = "ice";
            
            let hp = 34 + Math.floor(wave * 4.5);
            let spd = 0.95 + wave * 0.09;
            let dmg = 8 + Math.floor(wave/3);
            let radius = 22;
            let color = "#4b6e3b";
            let icon = "🧟";
            if(variant === "fast") { hp*=0.65; spd*=2.0; dmg = Math.max(5,dmg-3); color="#b5813a"; radius=18; icon="🧟⚡"; }
            if(variant === "tank") { hp*=2.1; spd*=0.55; dmg+=6; color="#6e4d2e"; radius=30; icon="🧟💪"; }
            if(variant === "ice") { hp*=1.2; spd*=0.7; dmg+=2; color="#6085a3"; radius=23; icon="🧟❄️"; special="slow"; }
            
            zombies.push({
                x, y, hp, maxHp: hp, speed: Math.min(4.2,spd), damage: dmg, radius: radius,
                variant: variant, color: color, icon: icon, special: special
            });
            enemiesToSpawn--;
            enemiesLeft++;
        }
        
        // спавн босса (каждые 5 волн)
        function summonBoss() {
            if(bossEntity) return;
            let bossHp = 380 + wave * 28;
            let bossSpd = 1.2 + wave*0.08;
            let bossDmg = 22 + Math.floor(wave/2);
            bossEntity = {
                x: 80 + Math.random() * (CW-200), y: 80 + Math.random()*(CH-160),
                hp: bossHp, maxHp: bossHp, speed: Math.min(2.8,bossSpd), damage: bossDmg,
                radius: 42, color: "#aa4f2a", icon: "👑🧟‍♂️", name: "Мясной Гигант"
            };
            enemiesLeft++;
        }
        
        function startWave(){
            if(gameOver) return;
            waveActive = true;
            let baseCount = 6 + Math.floor(wave * 1.2);
            enemiesToSpawn = Math.min(48, baseCount);
            enemiesLeft = 0;
            spawnTimer = 12;
            bossWave = (wave % 5 === 0 && wave !== 0);
            if(bossWave) summonBoss();
        }
        
        function updateWaveSystem(){
            if(gameOver) return;
            if(waveActive && spawnTimer <=0 && enemiesToSpawn>0){
                spawnZombie();
                spawnTimer = Math.max(14, 44 - Math.floor(wave/2.2));
            } else if(spawnTimer>0) spawnTimer--;
            
            let totalEnemies = enemiesLeft + (bossEntity?1:0);
            if(waveActive && enemiesToSpawn===0 && zombies.length===0 && !bossEntity){
                waveActive=false;
                wave++;
                let bonus = 55 + wave*3;
                coins += bonus;
                uiUpdate();
                startWave();
            }
        }
        
        // логика врагов + атака на игрока
        function updateZombiesAndBoss(){
            let allEnemies = [...zombies];
            if(bossEntity) allEnemies.push(bossEntity);
            for(let i=0;i<allEnemies.length;i++){
                let e = allEnemies[i];
                let dx = player.x - e.x, dy = player.y - e.y;
                let dist = Math.hypot(dx,dy);
                if(dist>0.01){
                    let move = Math.min(e.speed, dist - (e.radius+player.radius-3));
                    if(move>0){
                        e.x += (dx/dist)*move;
                        e.y += (dy/dist)*move;
                    }
                }
                if(Math.hypot(player.x - e.x, player.y - e.y) < player.radius + e.radius){
                    if(player.invincible <=0 && !gameOver){
                        player.hp -= e.damage;
                        player.invincible = 25;
                        if(player.hp<=0){ player.hp=0; gameOver=true; waveActive=false; }
                        uiUpdate();
                    }
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    e.x -= Math.cos(angle)*10;
                    e.y -= Math.sin(angle)*10;
                }
            }
            // удаление мертвых зомби
            for(let i=0;i<zombies.length;i++){
                if(zombies[i].hp <=0){
                    let val = 7 + Math.floor(Math.random()*12);
                    if(zombies[i].variant==="tank") val+=12;
                    coinDrops.push({x: zombies[i].x, y: zombies[i].y, value: val, life:1.0});
                    zombies.splice(i,1);
                    enemiesLeft--;
                    i--;
                }
            }
            if(bossEntity && bossEntity.hp<=0){
                coinDrops.push({x: bossEntity.x, y: bossEntity.y, value: 120 + wave*8, life:1.0});
                bossEntity=null;
                enemiesLeft--;
            }
        }
        
        // монеты и частицы
        function updateCoins(){
            for(let i=0;i<coinDrops.length;i++){
                coinDrops[i].life -= 0.018;
                if(coinDrops[i].life<=0){
                    coins += coinDrops[i].value;
                    coinDrops.splice(i,1);
                    uiUpdate();
                    i--;
                }
            }
            for(let i=0;i<particles.length;i++){
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if(particles[i].life<=0) particles.splice(i,1);
            }
        }
        
        // СТРЕЛЬБА (с критическим уроном)
        function shootAt(mx,my){
            if(gameOver) return false;
            let baseDmg = getDamage();
            let isCrit = (Math.random()*100) < getCritChance();
            let finalDmg = isCrit ? baseDmg*2.2 : baseDmg;
            
            // проверяем попадание по зомби или боссу
            for(let i=0;i<zombies.length;i++){
                let z = zombies[i];
                if(Math.hypot(mx - z.x, my - z.y) < z.radius+10){
                    z.hp -= finalDmg;
                    if(isCrit) addHitEffect(mx,my,"#ffbb66", 20);
                    else addHitEffect(mx,my,"#ff9f4a",12);
                    if(z.hp<=0){
                        let val = 7 + Math.floor(Math.random()*12);
                        coinDrops.push({x: z.x, y: z.y, value: val, life:1.0});
                        zombies.splice(i,1);
                        enemiesLeft--;
                    }
                    return true;
                }
            }
            if(bossEntity && Math.hypot(mx - bossEntity.x, my - bossEntity.y) < bossEntity.radius+15){
                bossEntity.hp -= finalDmg;
                addHitEffect(mx,my,"#f2843c", 24);
                if(bossEntity.hp<=0){
                    coinDrops.push({x: bossEntity.x, y: bossEntity.y, value: 100, life:1.0});
                    bossEntity=null;
                    enemiesLeft--;
                }
                return true;
            }
            return false;
        }
        
        let hitEffects = [];
        function addHitEffect(x,y,col,size){
            hitEffects.push({x:x, y:y, life:9, color:col || "#ffaa66", radius: size||14});
        }
        
        const keys = { ArrowUp:false,ArrowDown:false,ArrowLeft:false,ArrowRight:false, w:false,s:false,a:false,d:false };
        function handleMove(){
            let mx=0,my=0;
            if(keys.ArrowUp||keys.w) my-=1;
            if(keys.ArrowDown||keys.s) my+=1;
            if(keys.ArrowLeft||keys.a) mx-=1;
            if(keys.ArrowRight||keys.d) mx+=1;
            if(mx!==0||my!==0){ let len=Math.hypot(mx,my); mx/=len; my/=len; }
            let sp = getPlayerSpeed();
            let nx = player.x + mx*sp;
            let ny = player.y + my*sp;
            player.x = Math.min(Math.max(nx, 25+player.radius), CW-player.radius-15);
            player.y = Math.min(Math.max(ny, 30+player.radius), CH-player.radius-20);
            if(player.invincible>0) player.invincible--;
            if(abilityCooldown>0){ abilityCooldown--; if(abilityCooldown<=0 && !abilityReady){ abilityReady=true; document.getElementById('abilityBtn').innerHTML = "🌀 Атомный взрыв (готов)"; } }
        }
        
        // ---------- ОТРИСОВКА С ТЕКСТУРАМИ ----------
        function draw(){
            ctx.clearRect(0,0,CW,CH);
            // текстурированная земля
            ctx.fillStyle = "#2f5a28";
            ctx.fillRect(0,0,CW,CH);
            for(let i=0;i<400;i++){
                ctx.fillStyle = `rgba(80,100,40,${Math.random()*0.3})`;
                ctx.fillRect( (i*131)%CW, (i*73)%CH, 4,4);
            }
            // монетки
            for(let c of coinDrops){
                ctx.fillStyle = "#f7c56e";
                ctx.shadowBlur=6;
                ctx.font = "26px monospace";
                ctx.fillText("🪙", c.x-8, c.y-10);
                ctx.fillStyle = "#e5b03c";
                ctx.font = "bold 15px monospace";
                ctx.fillText(`+${c.value}`, c.x+8, c.y-12);
            }
            ctx.shadowBlur=0;
            
            // зомби с текстурками
            for(let z of zombies){
                ctx.fillStyle = z.color;
                ctx.beginPath(); ctx.arc(z.x, z.y, z.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#2c2418";
                ctx.font = `${Math.floor(z.radius)}px monospace`;
                ctx.fillText(z.icon, z.x-15, z.y-8);
                ctx.fillStyle = "#742020";
                ctx.fillRect(z.x-z.radius, z.y-z.radius-8, z.radius*2, 7);
                ctx.fillStyle = "#e6e678";
                ctx.fillRect(z.x-z.radius, z.y-z.radius-8, z.radius*2*(z.hp/z.maxHp), 7);
                // Эффект льда
                if(z.special === "slow"){ ctx.strokeStyle = "#aaf0ff"; ctx.beginPath(); ctx.arc(z.x, z.y, z.radius+2, 0, Math.PI*2); ctx.stroke(); }
            }
            // босс
            if(bossEntity){
                ctx.fillStyle = "#a05632";
                ctx.shadowBlur=10;
                ctx.beginPath(); ctx.arc(bossEntity.x, bossEntity.y, bossEntity.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#ffc285";
                ctx.font = "38px monospace";
                ctx.fillText(bossEntity.icon, bossEntity.x-28, bossEntity.y-12);
                ctx.fillStyle = "#c02222";
                ctx.fillRect(bossEntity.x-bossEntity.radius, bossEntity.y-bossEntity.radius-12, bossEntity.radius*2, 12);
                ctx.fillStyle = "#4ade80";
                ctx.fillRect(bossEntity.x-bossEntity.radius, bossEntity.y-bossEntity.radius-12, bossEntity.radius*2*(bossEntity.hp/bossEntity.maxHp), 12);
                ctx.fillStyle = "white"; ctx.font="bold 12px monospace";
                ctx.fillText(`${Math.floor(bossEntity.hp)}❤️`, bossEntity.x-20, bossEntity.y-20);
            }
            // игрок с проработкой
            ctx.shadowBlur=4;
            ctx.fillStyle = "#9abf6f";
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#f5e1a0";
            ctx.beginPath(); ctx.arc(player.x-7, player.y-5, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(player.x+7, player.y-5, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#35281a"; ctx.fillRect(player.x-8, player.y+5, 16, 8);
            ctx.fillStyle = "#dccf70"; ctx.font = "28px monospace"; ctx.fillText("🔥", player.x-12, player.y-12);
            if(player.invincible>0){ ctx.globalAlpha=0.4; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius+6, 0, Math.PI*2); ctx.fillStyle="#ffe6a3"; ctx.fill(); ctx.globalAlpha=1; }
            
            // эффекты ударов
            for(let h of hitEffects){
                ctx.fillStyle = h.color;
                ctx.beginPath(); ctx.arc(h.x, h.y, h.radius, 0, Math.PI*2); ctx.fill();
                h.life--; if(h.life<=0) hitEffects.shift();
            }
            for(let p of particles){
                ctx.fillStyle = `rgba(255, 100, 30, ${p.life/20})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
            }
            if(gameOver){
                ctx.globalAlpha=0.85; ctx.fillStyle="#211a10"; ctx.fillRect(0,0,CW,CH);
                ctx.globalAlpha=1; ctx.font="bold 44px monospace"; ctx.fillStyle="#cd6a2e";
                ctx.fillText("💀 ВЫ НЕ ВЫЖИЛИ 💀", CW/2-220, CH/2);
                ctx.font="22px monospace"; ctx.fillStyle="#f3c26b";
                ctx.fillText("Обновите страницу, чтобы начать апокалипсис заново", CW/2-300, CH/2+70);
                return;
            }
            ctx.fillStyle = "#f7e2b0"; ctx.font = "bold 15px monospace";
            ctx.fillText(`⚡ Способность: ${abilityReady ? "ГОТОВА (Q)" : "..."}`, 30, 70);
        }
        
        // обработчики
        function canvasClick(e){
            if(gameOver) return;
            let rect = canvas.getBoundingClientRect();
            let mx = (e.clientX - rect.left) * (CW/rect.width);
            let my = (e.clientY - rect.top) * (CH/rect.height);
            let now = Date.now();
            if(now - lastShotTime >= getShootDelay()){
                lastShotTime = now;
                shootAt(mx,my);
            }
        }
        
        function keyPress(e){
            let k = e.key;
            if(keys.hasOwnProperty(k)) keys[k]=true;
            if(k === 'q' || k === 'Q'){ nuclearBlast(); e.preventDefault(); }
            if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(k)) e.preventDefault();
        }
        function keyRelease(e){ let k=e.key; if(keys.hasOwnProperty(k)) keys[k]=false; }
        
        window.addEventListener('keydown', keyPress);
        window.addEventListener('keyup', keyRelease);
        
        document.getElementById('upgDmg').onclick = ()=>{
            if(coins>=costDmg()){ coins-=costDmg(); dmgLvl++; uiUpdate(); }};
        document.getElementById('upgSpd').onclick = ()=>{
            if(coins>=costSpd()){ coins-=costSpd(); speedLvl++; uiUpdate(); }};
        document.getElementById('upgFire').onclick = ()=>{
            if(coins>=costFire()){ coins-=costFire(); fireLvl++; uiUpdate(); }};
        document.getElementById('upgCrit').onclick = ()=>{
            if(coins>=costCrit()){ coins-=costCrit(); critLvl++; uiUpdate(); }};
        document.getElementById('abilityBtn').onclick = ()=>{ nuclearBlast(); };
        
        function gameLoop(){
            if(!gameOver){
                handleMove();
                updateZombiesAndBoss();
                updateCoins();
                updateWaveSystem();
                draw();
                uiUpdate();
            } else draw();
            requestAnimationFrame(gameLoop);
        }
        
        startWave(); uiUpdate(); canvas.addEventListener('click', canvasClick); gameLoop();
    })();
</script>
</body>
</html>
