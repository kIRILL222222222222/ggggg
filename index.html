<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zombie Defense - Защита базы с прокачкой</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f1f 0%, #071a0f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Monaco', monospace;
            font-weight: bold;
            padding: 20px;
        }

        .game-container {
            background: #1a2a1f;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 4px #5a3e2b, 0 12px 28px black;
            cursor: crosshair;
            background-color: #2d4a2a;
        }

        .ui-panel {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #0e1e0bdd;
            backdrop-filter: blur(4px);
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid #cbb87b;
        }

        .stats {
            display: flex;
            gap: 28px;
            background: #020d01;
            padding: 8px 24px;
            border-radius: 40px;
            color: #f9e7b3;
            text-shadow: 0 2px 2px black;
        }

        .stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 1.3rem;
        }

        .stat span:first-child {
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #b4ec9c;
        }

        .stat span:last-child {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
        }

        .weapon-upgrade {
            background: #2c2418;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 18px;
        }

        button {
            background: #6b3e1c;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 60px;
            color: #ffefc0;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #2d1a0a;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2d1a0a;
        }

        .wave-info {
            background: #030f02;
            padding: 5px 18px;
            border-radius: 32px;
            font-size: 1.3rem;
            color: #ffb347;
        }

        @media (max-width: 750px) {
            .stats { gap: 12px; padding: 4px 16px; }
            .stat span:last-child { font-size: 1.2rem; }
            button { padding: 4px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div class="ui-panel">
            <div class="stats">
                <div class="stat">❤️ <span id="baseHp">100</span></div>
                <div class="stat">🪙 <span id="coins">0</span></div>
                <div class="stat">🔫 <span id="damageLvl">1</span></div>
                <div class="stat">🗡️ <span id="fireRateLvl">1</span></div>
            </div>
            <div class="weapon-upgrade">
                <button id="upgradeDmg">💥 +Урон (💰 40)</button>
                <button id="upgradeSpeed">⚡ +Скорость (💰 35)</button>
            </div>
            <div class="wave-info">
                🌊 Волна <span id="waveNum">1</span> 
                <span style="font-size:0.8rem;">🧟‍♂️ <span id="zombiesLeft">0</span></span>
            </div>
        </div>
    </div>
    <div style="text-align: center; margin-top: 16px; color:#b9d2a5; font-size: 13px;">
        🖱️ КЛИК по зомби = убить ➕ получить монеты | 🧟‍♂️ доходят до базы ➡️ отнимают здоровье
    </div>
</div>

<script>
    (function(){
        // ------ CANVAS -------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ------ ИГРОВЫЕ РАЗМЕРЫ ------
        const CW = 1000, CH = 600;
        canvas.width = CW; canvas.height = CH;

        // ------ БАЗА ------
        const base = { x: CW-80, y: CH-120, w: 70, h: 85, hp: 100, maxHp: 100 };

        // ------ МОНЕТКИ (лут) ------
        let coins = 0;
        let coinItems = []; // { x, y, value }

        // ------ ЗОМБИ ------
        let zombies = [];
        let wave = 1;
        let zombiesToSpawn = 0;
        let waveInProgress = false;
        let spawnTimer = 0;
        let enemiesLeft = 0;
        
        // ------ ОРУЖИЕ (прокачка) ------
        let damageLevel = 1;       // базовый урон 10 + уровень*4
        let fireRateLevel = 1;     // задержка между выстрелами: 400мс / (уровень*0.2 + 0.8)
        let lastShotFrame = 0;
        
        // ------ ПАРАМЕТРЫ ВОЛН ------
        let frame = 0;
        let gameOver = false;
        
        // ---------- ФУНКЦИИ ПРОКАЧКИ ----------
        function getDamage(){
            return 10 + (damageLevel-1) * 6;  // 10,16,22,28...
        }
        
        function getShootDelayMs(){
            let baseDelay = 420;
            let reduction = (fireRateLevel-1) * 55;
            let finalDelay = Math.max(150, baseDelay - reduction);
            return finalDelay;
        }
        
        // стоимость апгрейда
        function getDamageUpgradeCost(){
            return 35 + (damageLevel-1)*12;
        }
        function getFireRateUpgradeCost(){
            return 30 + (fireRateLevel-1)*10;
        }
        
        // ---------- ГЕНЕРАЦИЯ МОНЕТОК ПРИ СМЕРТИ ----------
        function spawnCoinFromZombie(zx, zy){
            let value = 3 + Math.floor(Math.random() * 6); // 3-8 монет
            if(wave >= 5) value += 2;
            if(wave >= 10) value += 3;
            coinItems.push({
                x: zx + 10, y: zy + 15, value: value,
                life: 1.0   // для анимации
            });
        }
        
        // ---------- УРОН ПО ЗОМБИ (КЛИК МЫШИ) ----------
        function shootAt(x, y){
            if(gameOver) return false;
            let currentDamage = getDamage();
            let hit = false;
            for(let i=0; i<zombies.length; i++){
                const z = zombies[i];
                const zLeft = z.x - 20, zRight = z.x + 35, zTop = z.y-15, zBottom = z.y+40;
                if(x >= zLeft && x <= zRight && y >= zTop && y <= zBottom){
                    z.hp -= currentDamage;
                    hit = true;
                    if(z.hp <= 0){
                        // смерть зомби
                        spawnCoinFromZombie(z.x, z.y);
                        zombies.splice(i,1);
                        enemiesLeft--;
                    }
                    break; // один выстрел убивает/ранит одного зомби
                }
            }
            if(hit){
                // визуальный фидбек
                drawHitEffect(x,y);
                return true;
            }
            return false;
        }
        
        // эффект попадания (вспышка)
        let hitEffects = [];
        function drawHitEffect(x,y){
            hitEffects.push({x:x, y:y, timer:6});
        }
        
        // ---------- ВОЛНЫ ----------
        function startWave(){
            if(gameOver) return;
            waveInProgress = true;
            let baseSpawn = 4 + Math.floor(wave * 1.3);
            if(wave > 8) baseSpawn = 8 + Math.floor(wave * 0.9);
            zombiesToSpawn = Math.min(28, baseSpawn);
            enemiesLeft = zombiesToSpawn;
            spawnTimer = 12; // кадров между спавнами
        }
        
        function spawnZombie(){
            if(zombiesToSpawn <= 0) return;
            // статы зомби растут с волной
            let health = 25 + Math.floor(wave * 5.5);
            if(wave > 6) health += 8;
            if(wave > 12) health += 15;
            let speed = 0.9 + wave * 0.07;
            speed = Math.min(3.8, speed);
            let damage = 8 + Math.floor(wave/3);
            let reward = 5;
            zombies.push({
                x: 20 + Math.random() * 110,
                y: 60 + Math.random() * (CH-150),
                hp: health,
                maxHp: health,
                speed: speed,
                damage: damage,
                width: 32,
                height: 42
            });
            zombiesToSpawn--;
        }
        
        // обновление зомби: движение к базе
        function updateZombies(){
            for(let i=0; i<zombies.length; i++){
                const z = zombies[i];
                // направление к базе (центр базы)
                const targetX = base.x + base.w/2 - 15;
                const targetY = base.y + base.h/2 - 15;
                const dx = targetX - z.x;
                const dy = targetY - z.y;
                const len = Math.hypot(dx,dy);
                if(len > 0.5){
                    const move = Math.min(z.speed, len);
                    z.x += (dx/len) * move;
                    z.y += (dy/len) * move;
                }
                // проверка столкновения с базой
                if(z.x + 20 > base.x && z.x - 15 < base.x+base.w && z.y+20 > base.y && z.y-10 < base.y+base.h){
                    // атака базы
                    base.hp -= z.damage;
                    if(base.hp <= 0){
                        base.hp = 0;
                        gameOver = true;
                        waveInProgress = false;
                    }
                    zombies.splice(i,1);
                    enemiesLeft--;
                    i--;
                    updateBaseUI();
                }
            }
        }
        
        // обновление монеток (анимация)
        function updateCoins(){
            for(let i=0;i<coinItems.length;i++){
                coinItems[i].life -= 0.02;
                if(coinItems[i].life <= 0){
                    // добавить монеты в кошелек
                    coins += coinItems[i].value;
                    coinItems.splice(i,1);
                    i--;
                    updateCoinUI();
                }
            }
        }
        
        // логика волн и спавна
        function updateWaveSystem(){
            if(gameOver) return;
            if(!waveInProgress && zombies.length===0 && enemiesLeft===0 && zombiesToSpawn===0){
                // конец волны -> следующая
                wave++;
                updateWaveUI();
                startWave();
            }
            if(waveInProgress && spawnTimer <=0 && zombiesToSpawn>0){
                spawnZombie();
                spawnTimer = Math.max(18, 35 - Math.floor(wave/2));
            } else if(spawnTimer>0){
                spawnTimer--;
            }
        }
        
        // ---------- ОТРИСОВКА ВСЕГО ----------
        function draw(){
            ctx.clearRect(0,0,CW,CH);
            // земля/трава
            ctx.fillStyle = "#355a2b";
            ctx.fillRect(0,0,CW,CH);
            for(let i=0;i<120;i++){
                ctx.fillStyle = "#4a7840";
                ctx.beginPath();
                ctx.arc( (i*131)%CW, (i*73)%CH, 3,0,Math.PI*2);
                ctx.fill();
            }
            // дорожка к базе (эффект)
            ctx.globalAlpha=0.3;
            ctx.fillStyle = "#5f4c2b";
            for(let i=0;i<3;i++) ctx.fillRect(base.x-85+i*8, base.y+20, 90, 25);
            ctx.globalAlpha=1;
            
            // ---- РИСУЕМ БАЗУ ----
            ctx.shadowBlur=0;
            ctx.fillStyle="#7d5d42";
            ctx.fillRect(base.x, base.y, base.w, base.h);
            ctx.fillStyle="#b87c4f";
            ctx.fillRect(base.x+10, base.y-18, 50, 22);
            ctx.fillStyle="#e3b87c";
            ctx.beginPath();
            ctx.rect(base.x+25, base.y-6, 20, 12);
            ctx.fill();
            ctx.fillStyle = "#ff6a4b";
            ctx.font="bold 22px monospace";
            ctx.fillText("🏠", base.x+22, base.y+48);
            // полоска здоровья базы
            let hpPercent = base.hp/base.maxHp;
            ctx.fillStyle = "#511010";
            ctx.fillRect(base.x-5, base.y-30, 80, 12);
            ctx.fillStyle = "#d44a2a";
            ctx.fillRect(base.x-5, base.y-30, 80*hpPercent, 12);
            ctx.fillStyle="white";
            ctx.font="bold 14px monospace";
            ctx.fillText(`${Math.max(0,base.hp)}/${base.maxHp}`, base.x+12, base.y-20);
            
            // ---- ЗОМБИ ----
            for(let z of zombies){
                let healthPercent = z.hp/z.maxHp;
                ctx.fillStyle="#2f6b2f";
                ctx.beginPath();
                ctx.ellipse(z.x+12, z.y+15, 18, 25, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle="#39613a";
                ctx.beginPath();
                ctx.ellipse(z.x+10, z.y+5, 12, 15, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle="#2a2418";
                ctx.fillRect(z.x+3, z.y-2, 10, 6);
                ctx.fillRect(z.x+15, z.y-2, 10, 6);
                ctx.fillStyle="#7c3c1c";
                ctx.beginPath();
                ctx.ellipse(z.x+10, z.y+20, 10, 7, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle="#9a2f1f";
                ctx.beginPath();
                ctx.ellipse(z.x+6, z.y+12, 3, 4, 0, 0, Math.PI*2);
                ctx.ellipse(z.x+18, z.y+12, 3, 4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle="#27211a";
                ctx.fillRect(z.x+8, z.y+29, 12, 5);
                ctx.fillStyle="#a5563a";
                ctx.font = "bold 16px monospace";
                ctx.fillText("🧟", z.x+2, z.y+10);
                // полоска хп зомби
                ctx.fillStyle="#2f1e0a";
                ctx.fillRect(z.x-5, z.y-12, 44, 8);
                ctx.fillStyle="#cb3f1f";
                ctx.fillRect(z.x-5, z.y-12, 44*healthPercent, 8);
                ctx.fillStyle="#ffbf80";
                ctx.font = "10px monospace";
                ctx.fillText(`${z.hp}❤️`, z.x+5, z.y-3);
            }
            
            // ---- МОНЕТКИ НА ЗЕМЛЕ ----
            for(let c of coinItems){
                ctx.fillStyle = "#f5bc42";
                ctx.shadowBlur=6;
                ctx.font = `${18+Math.sin(Date.now()*0.01)*2}px monospace`;
                ctx.fillText("💰", c.x, c.y);
                ctx.fillStyle = "#efb034";
                ctx.font = "12px monospace";
                ctx.fillText(`+${c.value}`, c.x+15, c.y-2);
            }
            ctx.shadowBlur=0;
            
            // эффекты попадания
            for(let i=0;i<hitEffects.length;i++){
                let h = hitEffects[i];
                ctx.fillStyle = `rgba(255,200,80,${h.timer/6})`;
                ctx.beginPath();
                ctx.arc(h.x, h.y, 14,0,Math.PI*2);
                ctx.fill();
                h.timer--;
                if(h.timer<=0) hitEffects.splice(i,1);
            }
            
            // оружие / курсор
            ctx.fillStyle = "#ecdc9a";
            ctx.font = "bold 28px monospace";
            ctx.fillText("🔫", 30, 65);
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#ffecb3";
            ctx.fillText(`урон ${getDamage()} | скоростр.`, 20, 105);
            
            if(gameOver){
                ctx.globalAlpha=0.8;
                ctx.fillStyle = "#1d1410";
                ctx.fillRect(0,0,CW,CH);
                ctx.globalAlpha=1;
                ctx.font = "bold 38monospace";
                ctx.fillStyle = "#dd5522";
                ctx.fillText("⚰️ ВЫ ПРОИГРАЛИ ⚰️", CW/2-200, CH/2);
                ctx.font = "24px monospace";
                ctx.fillStyle = "#ffbe76";
                ctx.fillText("Обновите страницу, чтобы начать заново", CW/2-230, CH/2+70);
                return;
            }
            
            // надпись волны и остатки
            ctx.font = "bold 18px monospace";
            ctx.fillStyle = "#eef7cf";
            ctx.fillText(`Волна ${wave}  |  Осталось зомби: ${enemiesLeft}   спавн: ${zombiesToSpawn}`, 20, CH-24);
        }
        
        // ---------- ОБНОВЛЕНИЕ UI ----------
        function updateCoinUI(){
            document.getElementById('coins').innerText = coins;
        }
        function updateBaseUI(){
            document.getElementById('baseHp').innerText = Math.max(0,base.hp);
        }
        function updateWaveUI(){
            document.getElementById('waveNum').innerText = wave;
            document.getElementById('damageLvl').innerText = damageLevel;
            document.getElementById('fireRateLvl').innerText = fireRateLevel;
        }
        function upgradeDamage(){
            if(gameOver) return;
            let cost = getDamageUpgradeCost();
            if(coins >= cost){
                coins -= cost;
                damageLevel++;
                updateCoinUI();
                document.getElementById('damageLvl').innerText = damageLevel;
                updateWaveUI();
            } else {
                let msg = document.createElement("div");
                msg.innerText = "❗ Не хватает монет ❗";
                msg.style.position="fixed"; msg.style.bottom="10px"; msg.style.left="30%";
                msg.style.background="black"; msg.style.color="gold"; msg.style.padding="5px"; msg.style.borderRadius="20px";
                document.body.appendChild(msg);
                setTimeout(()=>msg.remove(),800);
            }
        }
        function upgradeFireRate(){
            if(gameOver) return;
            let cost = getFireRateUpgradeCost();
            if(coins >= cost){
                coins -= cost;
                fireRateLevel++;
                updateCoinUI();
                document.getElementById('fireRateLvl').innerText = fireRateLevel;
                updateWaveUI();
            } else {
                let msg = document.createElement("div");
                msg.innerText = "❗ Не хватает монет ❗";
                msg.style.position="fixed"; msg.style.bottom="10px"; msg.style.left="30%";
                msg.style.background="black"; msg.style.color="gold"; msg.style.padding="5px"; msg.style.borderRadius="20px";
                document.body.appendChild(msg);
                setTimeout(()=>msg.remove(),800);
            }
        }
        
        // ---------- ОБРАБОТЧИК ВЫСТРЕЛА (КЛИК ПО КАНВАСУ) ----------
        let lastShotTime = 0;
        function handleCanvasClick(e){
            if(gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            let now = Date.now();
            let delay = getShootDelayMs();
            if(now - lastShotTime >= delay){
                lastShotTime = now;
                shootAt(mouseX, mouseY);
            } else {
                // "дребезг" - слишком быстрый клик, но даём слабый визуал
                ctx.fillStyle = "#ffaa55";
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 10, 0, Math.PI*2);
                ctx.fill();
                setTimeout(()=>{},5);
            }
        }
        
        // ---------- ОСНОВНОЙ ЦИКЛ UPDATE ----------
        function gameUpdate(){
            if(gameOver){
                draw();
                requestAnimationFrame(gameUpdate);
                return;
            }
            updateZombies();
            updateCoins();
            updateWaveSystem();
            draw();
            // обновляем счетчик зомби в UI
            document.getElementById('zombiesLeft').innerText = zombies.length + zombiesToSpawn;
            requestAnimationFrame(gameUpdate);
        }
        
        // ---------- ЗАПУСК И ПОДКЛЮЧЕНИЯ----------
        function init(){
            startWave();
            updateCoinUI();
            updateBaseUI();
            updateWaveUI();
            base.hp = 100; base.maxHp=100;
            gameOver = false;
            canvas.addEventListener('click', handleCanvasClick);
            document.getElementById('upgradeDmg').addEventListener('click', upgradeDamage);
            document.getElementById('upgradeSpeed').addEventListener('click', upgradeFireRate);
            requestAnimationFrame(gameUpdate);
        }
        
        init();
    })();
</script>
</body>
</html>
