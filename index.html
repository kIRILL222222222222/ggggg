<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ткач Реальности | Игра измерений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', monospace;
            overflow: hidden;
            position: relative;
        }

        .game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), 0 0 60px rgba(150, 0, 255, 0.2);
            border-radius: 32px;
            padding: 8px;
            background: rgba(10, 10, 30, 0.6);
            backdrop-filter: blur(2px);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            cursor: crosshair;
            box-shadow: 0 0 0 2px rgba(0, 255, 255, 0.6), 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            font-weight: bold;
            text-shadow: 0 0 5px cyan;
        }

        .stats {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 60px;
            border-left: 3px solid #0ff;
            border-right: 3px solid #f0f;
            font-family: monospace;
            letter-spacing: 1px;
            font-size: 1.3rem;
            color: #aaffff;
            pointer-events: none;
        }

        .texture-badge {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 1rem;
            display: flex;
            gap: 15px;
            border: 1px solid rgba(255,0,255,0.5);
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffd966;
        }

        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #ccc;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }

        .powerup {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: gold;
            font-weight: bold;
            pointer-events: none;
            text-align: right;
            border-right: 3px solid gold;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 2px cyan; }
            100% { text-shadow: 0 0 12px magenta; }
        }

        .glow {
            animation: pulse 1s infinite alternate;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="650"></canvas>
</div>
<div class="ui-panel">
    <div class="stats">
        🧬 ЭНЕРГИЯ: <span id="energyVal">100</span> | 🌟 ОСКОЛКИ: <span id="fragVal">0</span>
    </div>
    <div class="texture-badge">
        <div class="badge">🎨 ТЕКСТУРА: <span id="textureName">НЕОН</span></div>
        <div class="badge">⚡ МОД: <span id="modActive">---</span></div>
    </div>
</div>
<div class="controls-info">
    🖱️ ЛКМ — собирать осколки | 🌀 ПКМ — менять текстуру мира | 🔥 Пробел — супер-волна
</div>
<div class="powerup">
    💠 Особый резонанс: <span id="specialCharge">0</span> / 3
</div>

<script>
    (function(){
        // ---------- КАНВАС ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Размеры
        let width = 1000;
        let height = 650;
        canvas.width = width;
        canvas.height = height;

        // ---------- ГЛОБАЛЬНЫЕ ПАРАМЕТРЫ ----------
        let energy = 100;          // здоровье/энергия
        let fragments = 0;         // осколки реальности (валюта)
        let specialMeter = 0;      // заряд спецспособности (макс 3)
        
        // Активные моды / эффекты
        let activeMod = null;       // "slow" или "double"
        let modTimer = 0;
        
        // Текстуры: 5 разных визуальных стилей (крутые текстурки)
        const textures = ["НЕОН", "ГОТИКА", "ЗОЛОТО", "ГЛТЧ", "ХАОС"];
        let currentTextureIdx = 0;  // 0=неон
        
        // Частицы/эффекты
        let particles = [];
        
        // Собираемые объекты - осколки (кристаллы)
        let shards = [];
        const MAX_SHARDS = 24;
        
        // Враждебные сущности - "Искажения"
        let enemies = [];
        const MAX_ENEMIES = 8;
        let enemySpawnCooldown = 0;
        
        // Система "Резонансная волна" (спецспособность)
        let shockwaveActive = false;
        let shockwaveRadius = 0;
        let shockwaveMaxRadius = 120;
        
        // Таймер для регенерации энергии (медленно)
        let regenTimer = 0;
        
        // ----- Вспомогательные функции -----
        function updateUI() {
            document.getElementById('energyVal').innerText = Math.floor(energy);
            document.getElementById('fragVal').innerText = fragments;
            document.getElementById('specialCharge').innerText = specialMeter;
            document.getElementById('textureName').innerText = textures[currentTextureIdx];
            if(activeMod && modTimer > 0) {
                let modName = activeMod === "slow" ? "🐢 ЗАМЕДЛЕНИЕ" : "💥 ДВОЙНЫЕ ОСКОЛКИ";
                document.getElementById('modActive').innerText = modName;
                if(activeMod === "slow") document.getElementById('modActive').style.color = "#88aaff";
                else document.getElementById('modActive').style.color = "#ffaa88";
            } else {
                document.getElementById('modActive').innerText = "---";
                if(activeMod) activeMod = null;
            }
        }
        
        // Добавление осколков с модификатором double
        function addFragments(amount) {
            let finalAmount = amount;
            if(activeMod === "double" && modTimer > 0) finalAmount = amount * 2;
            fragments += finalAmount;
            // При накоплении осколков заряжаем спецспособность (каждые 5 осколков = 1 заряд)
            let oldMeter = specialMeter;
            specialMeter = Math.min(3, specialMeter + Math.floor(finalAmount / 5));
            if(specialMeter > oldMeter && specialMeter <= 3) {
                spawnTextEffect("⚡ ЗАРЯД ПОЛУЧЕН!", canvas.width/2, 60, "#ffff88");
            }
            updateUI();
        }
        
        // Урон по энергии
        function damageEnergy(amount) {
            energy -= amount;
            if(energy <= 0) {
                energy = 0;
                gameOver();
            }
            updateUI();
            // эффект красной вспышки
            spawnTextEffect("💔", canvas.width/2, canvas.height/2, "#ff5555", 20);
        }
        
        function gameOver() {
            alert("🌀 Ткань реальности разорвана... Игра окончена. Нажмите ОК, чтобы перезапустить.");
            resetGame();
        }
        
        function resetGame() {
            energy = 100;
            fragments = 0;
            specialMeter = 0;
            activeMod = null;
            modTimer = 0;
            enemies = [];
            shards = [];
            particles = [];
            shockwaveActive = false;
            enemySpawnCooldown = 5;
            regenTimer = 0;
            currentTextureIdx = 0;
            // начальная генерация осколков и пары врагов
            for(let i=0;i<12;i++) spawnShard();
            for(let i=0;i<2;i++) spawnEnemy();
            updateUI();
        }
        
        // Появление осколка в случайной позиции
        function spawnShard() {
            if(shards.length >= MAX_SHARDS*1.5) return;
            shards.push({
                x: 40 + Math.random() * (width - 80),
                y: 40 + Math.random() * (height - 80),
                radius: 9,
                collectable: true,
                pulse: Math.random() * Math.PI * 2
            });
        }
        
        // Появление врага
        function spawnEnemy() {
            if(enemies.length >= MAX_ENEMIES+2) return;
            let side = Math.floor(Math.random() * 4);
            let x, y;
            if(side === 0) { x = Math.random() * width; y = -20; }
            else if(side === 2) { x = Math.random() * width; y = height+20; }
            else if(side === 1) { x = width+20; y = Math.random() * height; }
            else { x = -20; y = Math.random() * height; }
            enemies.push({
                x: x, y: y, radius: 16,
                speed: 0.6 + Math.random() * 0.7,
                angle: 0,
                hp: 2,
                pulse: 0
            });
        }
        
        // Эффекты текста
        function spawnTextEffect(text, x, y, color, size=18) {
            particles.push({
                type: "text", text: text, x: x, y: y, life: 1.0,
                vx: (Math.random()-0.5)*1.2, vy: -1.5 - Math.random()*2, color: color, size: size
            });
        }
        
        // Визуальные частицы (свечения)
        function addGlowParticle(x, y, color) {
            particles.push({
                type: "glow", x: x, y: y, life: 0.8, size: 4+Math.random()*6,
                vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2, color: color
            });
        }
        
        // Обработка спецспособности - волна резонанса
        function activateShockwave() {
            if(specialMeter >= 3 && !shockwaveActive) {
                specialMeter = 0;
                shockwaveActive = true;
                shockwaveRadius = 15;
                // Отталкиваем врагов и наносим урон
                for(let i=0;i<enemies.length;i++) {
                    let e = enemies[i];
                    let dx = e.x - canvas.width/2;
                    let dy = e.y - canvas.height/2;
                    let dist = Math.hypot(dx,dy);
                    if(dist < 180) {
                        e.hp -= 2;
                        addGlowParticle(e.x, e.y, "#ff66cc");
                        if(e.hp <= 0) {
                            enemies.splice(i,1);
                            i--;
                            addFragments(3);
                            spawnTextEffect("💥", e.x, e.y, "#ffaa44");
                        }
                    }
                }
                // собираем осколки в радиусе
                for(let i=0;i<shards.length;i++) {
                    let s = shards[i];
                    let dist = Math.hypot(s.x - canvas.width/2, s.y - canvas.height/2);
                    if(dist < 200) {
                        addFragments(2);
                        addGlowParticle(s.x, s.y, "gold");
                        shards.splice(i,1);
                        i--;
                    }
                }
                spawnTextEffect("🌀 РЕЗОНАНС!", canvas.width/2, canvas.height/2-30, "#ff44ff", 28);
                updateUI();
            } else {
                spawnTextEffect("Нужно 3 заряда!", canvas.width/2, 100, "#ff8888", 16);
            }
        }
        
        // Смена текстуры (ПКМ)
        function nextTexture() {
            currentTextureIdx = (currentTextureIdx + 1) % textures.length;
            // При смене текстуры появляется кратковременный мод-бонус (случайный)
            let r = Math.random();
            if(r < 0.4) {
                activeMod = (Math.random() < 0.6) ? "slow" : "double";
                modTimer = 180;  // ~3 секунды при 60fps
                spawnTextEffect(activeMod === "slow" ? "🐢 Замедление врагов" : "✨ Двойные осколки!", width/2, 80, "#aaffdd", 20);
            } else {
                // исцеление при смене текстуры
                energy = Math.min(100, energy+10);
                spawnTextEffect("♻️ Смена реальности +10❤️", width/2, 90, "#88ff88", 18);
            }
            updateUI();
            // визуальный взрыв частиц текстуры
            for(let i=0;i<30;i++) {
                addGlowParticle(width/2 + (Math.random()-0.5)*200, height/2 + (Math.random()-0.5)*150, `hsl(${Math.random()*360}, 80%, 60%)`);
            }
        }
        
        // Обновление логики
        function updateGame() {
            if(energy <= 0) return;
            
            // регенерация энергии
            regenTimer++;
            if(regenTimer > 120 && energy < 100) {
                energy = Math.min(100, energy+1);
                regenTimer = 0;
                updateUI();
            }
            
            // модификаторы
            if(modTimer > 0) {
                modTimer--;
                if(modTimer <= 0) activeMod = null;
            }
            
            // спавн врагов
            if(enemySpawnCooldown <= 0 && enemies.length < MAX_ENEMIES) {
                spawnEnemy();
                enemySpawnCooldown = 40;
            } else enemySpawnCooldown--;
            
            // спавн осколков
            if(shards.length < MAX_SHARDS && Math.random() < 0.02) spawnShard();
            
            // Движение врагов с замедлением если мод slow активен
            let enemySpeedMul = (activeMod === "slow" && modTimer>0) ? 0.45 : 1.0;
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                // направить к центру (игроку - курсор мыши? но для простоты - центр)
                let targetX = width/2, targetY = height/2;
                let dx = targetX - e.x;
                let dy = targetY - e.y;
                let len = Math.hypot(dx,dy);
                if(len > 0.1) {
                    let move = e.speed * enemySpeedMul;
                    e.x += (dx/len) * move;
                    e.y += (dy/len) * move;
                }
                // столкновение с игроком (центр канваса)
                let distToPlayer = Math.hypot(e.x - width/2, e.y - height/2);
                if(distToPlayer < e.radius + 18) {
                    damageEnergy(12);
                    addGlowParticle(e.x, e.y, "#ff2222");
                    enemies.splice(i,1);
                    i--;
                    continue;
                }
                // границы (не вылетают)
                e.x = Math.min(Math.max(e.x, -30), width+30);
                e.y = Math.min(Math.max(e.y, -30), height+30);
                e.pulse = (e.pulse + 0.05) % (Math.PI*2);
            }
            
            // Сбор осколков мышкой (клик)
            // Но сбор происходит в обработчике событий мыши, здесь просто обновим частоту спавна в ответ
            
            // волна 
            if(shockwaveActive) {
                shockwaveRadius += 9;
                if(shockwaveRadius >= shockwaveMaxRadius) shockwaveActive = false;
                // дополнительные эффекты
            }
            
            // Обновление частиц
            for(let i=0;i<particles.length;i++) {
                let p = particles[i];
                p.life -= 0.025;
                if(p.type === "text") {
                    p.x += p.vx;
                    p.y += p.vy;
                } else if(p.type === "glow") {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.size *= 0.98;
                }
                if(p.life <= 0) particles.splice(i,1), i--;
            }
        }
        
        // ----- ОТРИСОВКА С КРУТЫМИ ТЕКСТУРАМИ И ЭФФЕКТАМИ -----
        function drawTextureBackground() {
            // Заливка с градиентом
            let grad = ctx.createLinearGradient(0, 0, width, height);
            switch(currentTextureIdx) {
                case 0: // НЕОН
                    grad.addColorStop(0, "#0a002a");
                    grad.addColorStop(0.5, "#10103a");
                    grad.addColorStop(1, "#02001a");
                    ctx.fillStyle = grad;
                    ctx.fillRect(0,0,width,height);
                    ctx.strokeStyle = "#0ff";
                    ctx.lineWidth = 2;
                    for(let i=0;i<60;i++) {
                        ctx.beginPath();
                        ctx.moveTo(i*30,0);
                        ctx.lineTo(i*30+15,height);
                        ctx.strokeStyle = `rgba(0,255,255,${0.1+Math.sin(Date.now()*0.002+i)*0.05})`;
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(0,i*25);
                        ctx.lineTo(width,i*25+10);
                        ctx.stroke();
                    }
                    break;
                case 1: // ГОТИКА / ТЕМНЫЙ АРК
                    ctx.fillStyle = "#130b1c";
                    ctx.fillRect(0,0,width,height);
                    for(let i=0;i<200;i++) {
                        ctx.fillStyle = `rgba(70, 40, 80, ${0.1+Math.sin(i+Date.now()*0.001)*0.1})`;
                        ctx.fillRect(i%width, (i*23)%height, 4,4);
                    }
                    ctx.fillStyle = "#3a1f4d";
                    for(let s=0;s<30;s++) {
                        ctx.beginPath();
                        ctx.arc( (s*97)%width, (s*53)%height, 8, 0, Math.PI*2);
                        ctx.fill();
                    }
                    break;
                case 2: // ЗОЛОТО / ПЕСОК
                    ctx.fillStyle = "#2a1f0c";
                    ctx.fillRect(0,0,width,height);
                    let goldGrad = ctx.createLinearGradient(0,0,width,height);
                    goldGrad.addColorStop(0,"#b8860b");
                    goldGrad.addColorStop(1,"#daa520");
                    ctx.fillStyle = goldGrad;
                    ctx.globalAlpha=0.3;
                    for(let g=0;g<400;g++) {
                        ctx.fillRect(Math.random()*width, Math.random()*height, 3,3);
                    }
                    ctx.globalAlpha=1;
                    for(let i=0;i<12;i++) {
                        ctx.beginPath();
                        ctx.arc(width/2+Math.sin(Date.now()*0.0005+i)*40, height/2+Math.cos(i)*60, 35, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255,215,0,0.12)`;
                        ctx.fill();
                    }
                    break;
                case 3: // ГЛТЧ (Глитч-текстура)
                    ctx.fillStyle = "#0a0e1a";
                    ctx.fillRect(0,0,width,height);
                    for(let i=0;i<80;i++) {
                        let yOff = Math.sin(Date.now()*0.01+i)*20;
                        ctx.fillStyle = `rgba(0,255,200,0.2)`;
                        ctx.fillRect(i*13, yOff+height/3, 8, height/2);
                        ctx.fillStyle = `rgba(255,0,150,0.2)`;
                        ctx.fillRect(i*20+100, yOff+100, 5, height-150);
                    }
                    break;
                case 4: // ХАОС (кислотный)
                    ctx.fillStyle="#080808";
                    ctx.fillRect(0,0,width,height);
                    for(let i=0;i<500;i++) {
                        ctx.fillStyle = `hsl(${(Date.now()*0.5 + i*10)%360}, 80%, 55%)`;
                        ctx.fillRect(Math.random()*width, Math.random()*height, 2,2);
                    }
                    break;
                default: ctx.fillStyle = "#000"; ctx.fillRect(0,0,width,height);
            }
            ctx.globalAlpha = 1.0;
        }
        
        function drawShockwave(){
            if(shockwaveActive){
                ctx.beginPath();
                ctx.arc(width/2, height/2, shockwaveRadius, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(255, 70, 255, ${1 - shockwaveRadius/shockwaveMaxRadius})`;
                ctx.lineWidth = 6;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(width/2, height/2, shockwaveRadius-4, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(100, 200, 255, 0.8)`;
                ctx.stroke();
            }
        }
        
        function drawShards() {
            for(let s of shards) {
                let glow = 0.5 + Math.sin(Date.now()*0.008 + s.pulse)*0.3;
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#0ff";
                ctx.beginPath();
                // форма ромба/кристалл
                for(let ang=0; ang<Math.PI*2; ang+=Math.PI/2){
                    let x1 = s.x + Math.cos(ang)*s.radius;
                    let y1 = s.y + Math.sin(ang)*s.radius;
                    if(ang===0) ctx.moveTo(x1,y1);
                    else ctx.lineTo(x1,y1);
                }
                ctx.closePath();
                let grad = ctx.createLinearGradient(s.x-5, s.y-5, s.x+5, s.y+5);
                grad.addColorStop(0, "#ff44cc");
                grad.addColorStop(1, "#44ffcc");
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 18px monospace";
                ctx.shadowBlur = 8;
                ctx.fillText("✦", s.x-7, s.y+5);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawEnemies() {
            for(let e of enemies) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#f0f";
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius*0.7 + Math.sin(e.pulse*4)*2, 0, Math.PI*2);
                ctx.fillStyle = "#aa44ff";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius-3, 0, Math.PI*2);
                ctx.fillStyle = "#ff2277";
                ctx.fill();
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 18px monospace";
                ctx.fillText("⚠️", e.x-12, e.y-8);
                // отображение hp
                ctx.fillStyle = "#ffaa88";
                ctx.font = "bold 12px monospace";
                ctx.fillText(`❤️${e.hp}`, e.x-8, e.y+14);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawParticles() {
            for(let p of particles) {
                ctx.globalAlpha = p.life;
                if(p.type === "text"){
                    ctx.font = `bold ${p.size}px "Orbitron", monospace`;
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 6;
                    ctx.fillText(p.text, p.x, p.y);
                } else if(p.type === "glow"){
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1;
        }
        
        function drawPlayerIndicator() {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "cyan";
            ctx.beginPath();
            ctx.arc(width/2, height/2, 22, 0, Math.PI*2);
            ctx.fillStyle = "rgba(0,180,200,0.3)";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(width/2, height/2, 12, 0, Math.PI*2);
            ctx.fillStyle = "#88ddff";
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 30px monospace";
            ctx.fillText("🌀", width/2-13, height/2+10);
            ctx.shadowBlur = 0;
        }
        
        // Обработчики мыши для сбора осколков
        let mouseX = 0, mouseY = 0;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) * (width/rect.width);
            mouseY = (e.clientY - rect.top) * (height/rect.height);
        });
        
        function handleCollect(x,y) {
            for(let i=0;i<shards.length;i++) {
                let s = shards[i];
                let dx = s.x - x;
                let dy = s.y - y;
                if(Math.hypot(dx,dy) < s.radius+8) {
                    addFragments(2);
                    addGlowParticle(s.x, s.y, "#ffcc44");
                    shards.splice(i,1);
                    i--;
                }
            }
        }
        
        canvas.addEventListener('click', (e) => {
            if(energy<=0) return;
            const rect = canvas.getBoundingClientRect();
            let clickX = (e.clientX - rect.left) * (width/rect.width);
            let clickY = (e.clientY - rect.top) * (height/rect.height);
            handleCollect(clickX, clickY);
        });
        
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if(energy<=0) return;
            nextTexture();
        });
        
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') {
                e.preventDefault();
                activateShockwave();
            }
        });
        
        // Анимация
        function animate() {
            updateGame();
            drawTextureBackground();
            drawShards();
            drawEnemies();
            drawPlayerIndicator();
            drawShockwave();
            drawParticles();
            updateUI();
            requestAnimationFrame(animate);
        }
        
        // Инициализация
        function init() {
            resetGame();
            animate();
            // доп спавн начальный
            for(let i=0;i<6;i++) spawnShard();
        }
        
        init();
    })();
</script>
</body>
</html>
